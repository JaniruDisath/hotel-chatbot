<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leisure Land Villa Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-shell">
        <div class="page-backdrop"></div>
        <div class="global-bubble-field" aria-hidden="true">
            <span class="global-bubble gb-1"></span>
            <span class="global-bubble gb-2"></span>
            <span class="global-bubble gb-3"></span>
            <span class="global-bubble gb-4"></span>
            <span class="global-bubble gb-5"></span>
            <span class="global-bubble gb-6"></span>
            <span class="global-bubble gb-7"></span>
            <span class="global-bubble gb-8"></span>
            <span class="global-bubble gb-9"></span>
            <span class="global-bubble gb-10"></span>
            <span class="global-bubble gb-11"></span>
            <span class="global-bubble gb-12"></span>
            <span class="global-bubble gb-13"></span>
            <span class="global-bubble gb-14"></span>
            <span class="global-bubble gb-15"></span>
            <span class="global-bubble gb-16"></span>
            <span class="global-bubble gb-17"></span>
            <span class="global-bubble gb-18"></span>
        </div>

        <div class="main-content-wrapper flex justify-center items-start gap-4 p-4">
            <div class="left-column">
                <div class="col" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300">
                    <div class="cardsss hero-shell w-full">
                        <div id="info-panel" class="columnImg info-panel">
                            <h1 class="gradient-text">Welcome to <br> Leisure Land Villa.</h1>
                            <div id="info-panel-H" class="row" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="250"></div>
                        </div>
                    </div>
                </div>

                <div class="col content-strip" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="350">
                    <div class="cardsss carousel-shell w-screen">
                        <div class="card-body justify-center">
                            <div class="scroll-wrapper">
                                <button class="scroll-btn left" onclick="scrollCardsLeft()">&#8249;</button>
                                <div id="card-list-body" class="scroll-container"></div>
                                <button class="scroll-btn right" onclick="scrollCardsRight()">&#8250;</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400">
                <div class="chat-shell w-full p-4 rounded-lg shadow-sm">
                    <div class="chat-header">
                        <div class="chat-header-row">
                            <span class="hero-badge">Hotel Assistant</span>
                            <button class="chat-home-btn" onclick="goHome()" type="button">Home</button>
                        </div>
                    </div>

                    <div class="chat-log w-full p-4 rounded-lg">
                        <div id="chatArea" class="flow-root">
                            <div class="chat-message chat-message-bot" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="500">
                                <img class="chat-avatar" src="assets/img/leisrue Land Logo.jpg" alt="Hotel assistant avatar">
                                <div class="chat-bubble chat-bubble-bot">
                                    <div class="chat-label">Hotel Help Assistant</div>
                                    <p>Hello. How can I assist you today?</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="chat-input-container">
                        <input id="chatInput" type="text" placeholder="Ask about rooms, meals, events, or hotel info">
                        <button onclick="sendHotelMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="src/JavaScriptFiles/hotelInfoArray.js"></script>
    <script src="src/JavaScriptFiles/menuList.js"></script>
    <script src="basicFunctions.js"></script>
    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init();
    </script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.6.2/dist/dotlottie-wc.js" type="module"></script>
    <script src="https://unpkg.com/css-doodle@0.50.2/css-doodle.min.js"></script>
</body>

</html>
